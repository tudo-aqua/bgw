config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false
  excludes: []

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'IssuesReport'
    - 'FileBasedIssuesReport'

comments:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  AbsentOrWrongFileLicense:
    # Rationale: handled by Spotless
    active: false

  DeprecatedBlockTag:
    # Rationale: useful to detect outdated KDoc
    active: true

  DocumentationOverPrivateFunction:
    # Rationale: useful for complex internal APIs
    active: false

  DocumentationOverPrivateProperty:
    # Rationale: useful for complex internal APIs
    active: false

  EndOfSentenceFormat:
    # Rationale: enforce consistent documentation style
    active: true

  OutdatedDocumentation:
    # Rationale: maintenance issues
    active: true

  UndocumentedPublicClass:
    # Rationale: enforce API documentation
    active: true

  UndocumentedPublicFunction:
    # Rationale: enforce API documentation
    active: true

  UndocumentedPublicProperty:
    # Rationale: enforce API documentation
    active: true

complexity:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Mostly disabled. Rationale: better suited for code review
  CyclomaticComplexMethod:
    active: false

  ComplexCondition:
    active: false

  ComplexInterface:
    active: false

  LabeledExpression:
    active: false

  LargeClass:
    active: false

  LongMethod:
    active: false

  LongParameterList:
    active: false

  MethodOverloading:
    active: false

  NamedArguments:
    active: false

  NestedBlockDepth:
    active: false

  ReplaceSafeCallChainWithRun:
    # Rationale: easily avoidable, bad style
    active: true

  StringLiteralDuplication:
    # Rationale: maintenance issue
    active: true

  TooManyFunctions:
    active: false

coroutines:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Mostly enabled. Rationale: indicative of errors
  GlobalCoroutineUsage:
    active: true

  InjectDispatcher:
    # Rationale: project does not use DI
    active: false

  RedundantSuspendModifier:
    active: true

  SleepInsteadOfDelay:
    active: true

  SuspendFunWithFlowReturnType:
    active: true

empty-blocks:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Completely enabled. Rationale: indicative of errors
  EmptyCatchBlock:
    active: true

  EmptyClassBlock:
    active: true

  EmptyDefaultConstructor:
    active: true

  EmptyDoWhileBlock:
    active: true

  EmptyElseBlock:
    active: true

  EmptyFinallyBlock:
    active: true

  EmptyForBlock:
    active: true

  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

  EmptyIfBlock:
    active: true

  EmptyInitBlock:
    active: true

  EmptyKotlinFile:
    active: true

  EmptySecondaryConstructor:
    active: true

  EmptyTryBlock:
    active: true

  EmptyWhenBlock:
    active: true

  EmptyWhileBlock:
    active: true

exceptions:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Mostly enabled. Rationale: indicative of errors
  ExceptionRaisedInUnexpectedLocation:
    active: true

  InstanceOfCheckForException:
    active: true

  NotImplementedDeclaration:
    active: true

  ObjectExtendsThrowable:
    active: true

  PrintStackTrace:
    active: true

  RethrowCaughtException:
    active: true

  ReturnFromFinally:
    active: true

  SwallowedException:
    # Rationale: also catches normal error handling
    active: false

  ThrowingExceptionFromFinally:
    active: true

  ThrowingExceptionInMain:
    active: true

  ThrowingExceptionsWithoutMessageOrCause:
    active: true

  ThrowingNewInstanceOfSameException:
    active: true

  TooGenericExceptionCaught:
    active: true

  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Mostly enabled. Rationale: principle of least surprise
  BooleanPropertyNaming:
    active: true

  ClassNaming:
    active: true

  ConstructorParameterNaming:
    active: true

  EnumNaming:
    active: true

  ForbiddenClassName:
    # Rationale: non-indicative names
    active: true
    forbiddenName:
      - 'Util'

  FunctionNameMaxLength:
    # Rationale: better suited for code review
    active: false

  FunctionNameMinLength:
    # Rationale: better suited for code review
    active: false

  FunctionNaming:
    active: true

  FunctionParameterNaming:
    active: true

  InvalidPackageDeclaration:
    active: true

  LambdaParameterNaming:
    active: true

  MatchingDeclarationName:
    active: true
    mustBeFirst: false

  MemberNameEqualsClassName:
    active: true

  NoNameShadowing:
    active: true

  ObjectPropertyNaming:
    active: true

  PackageNaming:
    active: true

  TopLevelPropertyNaming:
    active: true

  VariableNaming:
    active: true

performance:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Completely enabled. Rationale: indicative of errors
  ArrayPrimitive:
    active: true

  ForEachOnRange:
    active: true

  SpreadOperator:
    active: true

  UnnecessaryTemporaryInstantiation:
    active: true

potential-bugs:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Completely enabled. Rationale: indicative of errors
  AvoidReferentialEquality:
    active: true

  CastToNullableType:
    active: true

  Deprecation:
    active: true

  DontDowncastCollectionTypes:
    active: true

  DoubleMutabilityForCollection:
    active: true

  EqualsAlwaysReturnsTrueOrFalse:
    active: true

  EqualsWithHashCodeExist:
    active: true

  ExitOutsideMain:
    active: true

  ExplicitGarbageCollectionCall:
    active: true

  HasPlatformType:
    active: true

  IgnoredReturnValue:
    active: true

  ImplicitDefaultLocale:
    active: true

  ImplicitUnitReturnType:
    active: true

  InvalidRange:
    active: true

  IteratorHasNextCallsNextMethod:
    active: true

  MapGetWithNotNullAssertionOperator:
    active: true

  MissingPackageDeclaration:
    active: true

  UnnecessaryNotNullOperator:
    active: true

  UnnecessarySafeCall:
    active: true

  UnreachableCatchBlock:
    active: true

  UnreachableCode:
    active: true

  UnsafeCallOnNullableType:
    active: true

  UnsafeCast:
    active: true

  UnusedUnaryOperator:
    active: true

  UselessPostfixExpression:
    active: true

  WrongEqualsTypeParameter:
    active: true

style:
  active: true
  excludes: ['**/bgw-docs-examples/**', '**/bgw-net-server/**']

  # Partially enabled to complement Spotless
  ClassOrdering:
    active: true

  CollapsibleIfStatements:
    active: true

  EqualsNullCall:
    active: true

  ExplicitCollectionElementAccessMethod:
    active: true

  ExplicitItLambdaParameter:
    active: true

  ExpressionBodySyntax:
    active: true
    includeLineWrapping: true

  ForbiddenVoid:
    active: true

  FunctionOnlyReturningConstant:
    active: true

  MayBeConstant:
    active: true

  ModifierOrder:
    active: true

  NestedClassesVisibility:
    active: true

  ObjectLiteralToLambda:
    active: true

  OptionalAbstractKeyword:
    active: true

  ProtectedMemberInFinalClass:
    active: true

  RedundantExplicitType:
    active: true

  RedundantHigherOrderMapUsage:
    active: true

  RedundantVisibilityModifier:
    active: true

  SafeCast:
    active: true

  SerialVersionUIDInSerializableClass:
    active: true

  UnnecessaryApply:
    active: true

  UnnecessaryFilter:
    active: true

  UnnecessaryInheritance:
    active: true

  UnnecessaryLet:
    active: true

  RangeUntilInsteadOfRangeTo:
    active: true

  UnusedImport:
    active: true

  UnusedPrivateClass:
    active: true

  UnusedPrivateFunction:
    active: true

  UnusedPrivateProperty:
    active: true

  UseAnyOrNoneInsteadOfFind:
    active: true

  UseArrayLiteralsInAnnotations:
    active: true

  UseCheckNotNull:
    active: true

  UseCheckOrError:
    active: true

  UseDataClass:
    active: true
    allowVars: true

  UseEmptyCounterpart:
    active: true

  UseIfEmptyOrIfBlank:
    active: true

  UseIsNullOrEmpty:
    active: true

  UseOrEmpty:
    active: true

  UseRequire:
    active: true

  UseRequireNotNull:
    active: true

  UselessCallOnNotNull:
    active: true

  UtilityClassWithPublicConstructor:
    active: true

  VarCouldBeVal:
    active: true